<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>键盘高度检测测试</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    .editor-container {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      background: #f5f5f5;
    }
    
    .editor-content {
      background: white;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    
    .textarea-wrapper {
      padding: 12px;
    }
    
    #editor-textarea {
      width: 100%;
      min-height: 200px;
      resize: none;
      border: none;
      font-size: 16px;
      line-height: 1.5;
      outline: none;
    }
    
    .bottom-nav {
      position: fixed; /* 固定定位 */
      bottom: 0;
      left: 0;
      right: 0;
      height: 56px; /* 与用户代码中的h-16对应 */
      background: #333;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      z-index: 50; /* 高优先级 */
      flex-shrink: 0; /* 关键设置：禁止导航栏收缩 */
    }
    
    .controls {
      padding: 16px;
      background: #eee;
    }
    
    .btn {
      padding: 8px 16px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin-right: 8px;
    }
    
    .log {
      margin-top: 16px;
      padding: 12px;
      background: #333;
      color: #00ff00;
      font-family: monospace;
      border-radius: 4px;
      overflow: auto;
      max-height: 200px;
    }
  </style>
</head>
<body>
  <div class="editor-container">
    <div class="editor-content">
      <div class="textarea-wrapper">
        <textarea id="editor-textarea" placeholder="点击此处弹出输入法，观察控制台日志"></textarea>
      </div>
    </div>
  </div>
  
  <div class="bottom-nav" id="bottom-nav">
    底部导航栏 (fixed position, flex-shrink: 0)
  </div>
  
  <div class="controls">
    <button class="btn" id="toggle-shrink">切换flex-shrink (0/1)</button>
    <button class="btn" id="reset-log">清空日志</button>
    <div class="log" id="log"></div>
  </div>

  <script>
    // 初始化日志
    const logElement = document.getElementById('log');
    const textarea = document.getElementById('editor-textarea');
    const bottomNav = document.getElementById('bottom-nav');
    const toggleBtn = document.getElementById('toggle-shrink');
    const resetBtn = document.getElementById('reset-log');
    
    // 记录初始状态
    let isShrinkEnabled = false;
    let initialHeight = window.innerHeight;
    let initialVisualHeight = window.visualViewport ? window.visualViewport.height : initialHeight;
    
    // 添加日志
    function addLog(message) {
      const timestamp = new Date().toLocaleTimeString();
      logElement.innerHTML += `<div>[${timestamp}] ${message}</div>`;
      logElement.scrollTop = logElement.scrollHeight;
    }
    
    // 记录初始高度
    addLog(`初始窗口高度: ${initialHeight}px`);
    addLog(`初始视觉视口高度: ${initialVisualHeight}px`);
    addLog(`初始键盘高度差: ${initialHeight - initialVisualHeight}px`);
    
    // 监听visualViewport变化
    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', () => {
        const currentHeight = window.visualViewport.height;
        const diff = initialHeight - currentHeight;
        
        addLog(`visualViewport.resize触发 - 高度: ${currentHeight}px, 差值: ${diff}px`);
      });
    }
    
    // 监听window resize变化
    window.addEventListener('resize', () => {
      const currentHeight = window.innerHeight;
      const diff = initialHeight - currentHeight;
      
      addLog(`window.resize触发 - 高度: ${currentHeight}px, 差值: ${diff}px`);
    });
    
    // 监听Textarea焦点
    textarea.addEventListener('focus', () => {
      setTimeout(() => {
        const currentHeight = window.innerHeight;
        const visualHeight = window.visualViewport ? window.visualViewport.height : currentHeight;
        const diff = initialHeight - currentHeight;
        
        addLog(`Textarea.focus触发 - 窗口高度: ${currentHeight}px, 视觉视口高度: ${visualHeight}px, 差值: ${diff}px`);
      }, 300);
    });
    
    // 切换flex-shrink
    toggleBtn.addEventListener('click', () => {
      isShrinkEnabled = !isShrinkEnabled;
      bottomNav.style.flexShrink = isShrinkEnabled ? '1' : '0';
      addLog(`已切换flex-shrink为: ${isShrinkEnabled ? '1' : '0'}`);
    });
    
    // 清空日志
    resetBtn.addEventListener('click', () => {
      logElement.innerHTML = '';
    });
  </script>
</body>
</html>
